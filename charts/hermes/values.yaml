namespace: hermes

image:
  repository: ghcr.io/cn-jwsong/hermes
  tag: latest
  pullPolicy: Always

secrets:
  openaiApiKey: "your-openai-api-key-here"
  gatewayAllowAllUsers: "true"
  anthropicApiKey: ""
  telegramBotToken: ""

gateway:
  replicas: 1
  service:
    type: ClusterIP
    port: 8642
  resources:
    requests:
      memory: "512Mi"
      cpu: "256m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

dashboard:
  replicas: 1
  service:
    type: ClusterIP
    port: 9119
  resources:
    requests:
      memory: "512Mi"
      cpu: "256m"
    limits:
      memory: "2GI"
      cpu: "1000m"

persistence:
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

shmSize: "1Gi"

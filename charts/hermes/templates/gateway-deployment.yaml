apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-gateway
  template:
    metadata:
      labels:
        app: hermes-gateway
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: hermes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/hermes", "gateway", "run"]
          ports:
            - containerPort: {{ .Values.gateway.service.port }}
          envFrom:
            - secretRef:
                name: hermes-secrets
          volumeMounts:
            - name: data
              mountPath: /root/.hermes
            - name: dshm
              mountPath: /dev/shm
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize | quote }}
